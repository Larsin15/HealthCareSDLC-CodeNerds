# mvn checkstyle:check
# mvn test
# mvn package

name: Java CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./HealthCareSDLC-CodeNerds
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Check code style
        run: ./mvnw checkstyle:check
      
      - name: Build and test
        run: ./mvnw verify


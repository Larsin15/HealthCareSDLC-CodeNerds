name: Java CI

on:
  push:
    branches: [dev, main]
    paths:
      - '**.java'
      - 'pom.xml'
      - 'checkstyle.xml'
  pull_request:
    branches: [dev, main]
    paths:
      - '**.java'
      - 'pom.xml'
      - 'checkstyle.xml'

jobs:
  lint:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      
      - name: Check code style
        run: ./mvnw checkstyle:check
      
      - name: Compile (no tests)
        run: ./mvnw compile -DskipTests

